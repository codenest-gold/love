<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Do you love me? ❤</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #ffeef2;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            text-align: center;
        }

        .container {
            width: 90%;
            max-width: 400px;
        }

        img {
            width: 250px;
            height: 250px;
            object-fit: contain;
            border-radius: 20px;
            margin-bottom: 20px;
        }

        h1 {
            color: #d63384;
            font-size: 2rem;
            margin-bottom: 30px;
        }

        .buttons {
            position: relative;
            display: flex;
            gap: 40px; /* مسافة كافية بين الأزرار */
            justify-content: center;
            align-items: center;
            height: 80px;
        }

        .btn {
            padding: 12px 35px;
            font-size: 1.2rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            color: white;
            background-color: #ff4d6d;
            box-shadow: 0 4px 10px rgba(255, 77, 109, 0.3);
            transition: 0.2s;
            text-decoration: none;
            display: inline-block;
        }

        .no-btn {
            position: absolute;
            left: 58%; /* تعديل مكان البداية لعدم الالتصاق */
        }

        /* تنسيق زر الواتساب */
        .wa-btn {
            background-color: #25D366; /* لون الواتساب الأخضر */
            margin-top: 20px;
            box-shadow: 0 4px 10px rgba(37, 211, 102, 0.3);
            font-size: 1rem;
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.6rem; }
            img { width: 220px; height: 220px; }
            .buttons { gap: 30px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="question-section">
            <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHpueGZ3bmZ3bmZ3bmZ3bmZ3bmZ3bmZ3bmZ3bmZ3bmZ3bmZ3JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1z/cLS1cfxvGOPVpf9g3y/giphy.gif" alt="Asking">
            <h1>Do you love me? ❤</h1>
            <div class="buttons">
                <button class="btn yes-btn" onclick="sayYes()">Yes</button>
                <button class="btn no-btn" id="no-btn" onmouseover="moveButton()" onclick="moveButton()">No</button>
            </div>
        </div>

        <div id="result-section" class="hidden">
            <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExZ3NueGZ3bmZ3bmZ3bmZ3bmZ3bmZ3bmZ3bmZ3bmZ3bmZ3bmZ3JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1z/KztT2c4u8mYYUiMKdJ/giphy.gif" alt="Cute Love">
            <h1>I knew it! ❤😏</h1>
            
            <a href="https://wa.me/201124680211?text=انا%20بحبك%20ومقدرش%20اعيش%20من%20غيرك" target="_blank" class="btn wa-btn">
                اضغط هنا قولي الكلمتين دول 😉
            </a>
        </div>
    </div>

    <script>
        function moveButton() {
            const btn = document.getElementById('no-btn');
            const padding = 50;
            const x = Math.random() * (window.innerWidth - btn.offsetWidth - padding);
            const y = Math.random() * (window.innerHeight - btn.offsetHeight - padding);
            
            btn.style.position = "fixed";
            btn.style.left = x + "px";
            btn.style.top = y + "px";
        }

        function sayYes() {
            document.getElementById('question-section').classList.add('hidden');
            document.getElementById('result-section').classList.remove('hidden');
            document.body.style.backgroundColor = "#ffdeeb";
        }
    </script>

</body>
</html>
